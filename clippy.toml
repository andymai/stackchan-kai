    "M5Stack",
    "ESP32",
    "ESP32-S3",
    "ESP-IDF",
    "AXP2101",
    "ILI9342C",
    "ILI9342",
    "PMIC",
    "GPIO",
    "SPI",
    "I2C",
    "PSRAM",
    "OTA",
    "BLE",
    "WiFi",
    "MIPI-DSI",
    "..",
]
