name: CI

on:
  push:
    branches: [main]
    # Skip CI for changes that can't affect build output (pure docs,
    # licenses, hook scripts). Any touch to `.yml` / `.toml` / `.rs`
    # still triggers, so the "I forgot my change is actually code"
    # footgun is bounded.
    paths-ignore:
      - '**.md'
      - 'LICENSE-*'
      - '.githooks/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE-*'
      - '.githooks/**'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  host:
    name: Host (core + sim + axp2101)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (host crates)
        run: cargo clippy --workspace --exclude stackchan-firmware --all-features -- -D warnings

      - name: Test (host crates)
        run: cargo test --workspace --exclude stackchan-firmware --all-features

      # `cargo build` is redundant with `cargo test` above — the test
      # pass builds every target. Dropping it saves ~6 s of Host runtime.

      - name: Doc check (host crates)
        run: cargo doc --no-deps --workspace --exclude stackchan-firmware --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arg: --workspace

  firmware:
    name: Firmware cross-check (xtensa-esp32s3-none-elf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false
      - uses: Swatinem/rust-cache@v2

      # Run from inside the firmware crate so cargo picks up
      # crates/stackchan-firmware/.cargo/config.toml, which sets
      # `unstable.build-std = ["alloc", "core"]` — required because
      # `core` isn't precompiled for xtensa-esp32s3-none-elf. The
      # previous workspace-root invocation bypassed this config and
      # failed with `error[E0463]: can't find crate for 'core'`.
      - name: Clippy (firmware)
        working-directory: crates/stackchan-firmware
        run: cargo clippy --all-features -- -D warnings

      # `cargo check` is redundant with `cargo clippy` above — clippy
      # runs a full type-check as part of its lint pass. Dropping it
      # cuts ~45 s off the 2 m 22 s firmware job (the longest in CI).

  msrv:
    name: MSRV (host crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2

      - name: Build on MSRV
        run: cargo build --workspace --exclude stackchan-firmware --all-features
