name: CI

on:
  push:
    branches: [main]
    # Skip CI for changes that can't affect build output (pure docs,
    # licenses, hook scripts). Any touch to `.yml` / `.toml` / `.rs`
    # still triggers, so the "I forgot my change is actually code"
    # footgun is bounded.
    paths-ignore:
      - '**.md'
      - 'LICENSE-*'
      - '.githooks/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE-*'
      - '.githooks/**'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  host:
    name: Host (core + sim + drivers)
    # Skip on release-please PRs (machine-generated version bumps —
    # no code changes to test). Branch-protection treats a SKIPPED
    # required check as success, so this is safe to gate on. The
    # `push: main` trigger is unaffected; we still validate the
    # post-merge state on main.
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore: release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      # `--all-targets` also lints examples + integration tests, matching
      # the pre-commit hook so local and CI lint passes can't diverge.
      - name: Clippy (host crates)
        run: cargo clippy --workspace --exclude stackchan-firmware --all-features --all-targets -- -D warnings

      - name: Test (host crates)
        run: cargo test --workspace --exclude stackchan-firmware --all-features

      # `cargo build` is redundant with `cargo test` above — the test
      # pass builds every target. Dropping it saves ~6 s of Host runtime.

      - name: Doc check (host crates)
        run: cargo doc --no-deps --workspace --exclude stackchan-firmware --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  supply-chain:
    name: Supply chain (cargo-deny)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore: release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Default features only — the action's default `arguments`
          # ('--all-features') would override deny.toml's
          # `[graph] all-features = false` and pull every opt-in dev
          # feature (e.g. stackchan-sim's `viz` with the eframe/egui
          # GUI stack) into the supply-chain scan.
          arguments: --workspace

  firmware:
    name: Firmware cross-check (xtensa-esp32s3-none-elf)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore: release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false
      - uses: Swatinem/rust-cache@v2

      # Run from inside the firmware crate so cargo picks up
      # crates/stackchan-firmware/.cargo/config.toml, which sets
      # `unstable.build-std = ["alloc", "core"]` — required because
      # `core` isn't precompiled for xtensa-esp32s3-none-elf. The
      # previous workspace-root invocation bypassed this config and
      # failed with `error[E0463]: can't find crate for 'core'`.
      - name: Clippy (firmware)
        working-directory: crates/stackchan-firmware
        run: cargo clippy --all-features -- -D warnings

      # `cargo check` is redundant with `cargo clippy` above — clippy
      # runs a full type-check as part of its lint pass. Dropping it
      # cuts ~45 s off the 2 m 22 s firmware job (the longest in CI).

  msrv:
    name: MSRV (host crates)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore: release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2

      # Default features only. Optional dev-tooling features (e.g.
      # `stackchan-sim`'s `viz` feature pulling in eframe/egui/winit)
      # are not gated on MSRV — they're opt-in tools, not runtime deps.
      - name: Build on MSRV
        run: cargo build --workspace --exclude stackchan-firmware

  doc-drift:
    name: Doc drift (READMEs vs src/)
    # Warn-only — informational, not a merge gate. Skipped on
    # release-please PRs (their version-bump churn would always trigger
    # drift warnings). Full git history needed for the `rev-list` count.
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'release-kun[bot]' ||
      !startsWith(github.event.pull_request.title, 'chore: release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check per-crate README drift
        run: bash scripts/check-doc-drift.sh
