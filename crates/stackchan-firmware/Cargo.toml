[package]
name = "stackchan-firmware"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "no_std + alloc firmware binary for the M5Stack CoreS3 StackChan; wires the stackchan-core domain onto esp-hal + mipidsi."
publish = false

[lints]
workspace = true

[dependencies]
stackchan-core = { path = "../stackchan-core" }
axp2101 = { path = "../axp2101" }
# esp-hal + embassy dependencies are intentionally commented out in v0.1.0
# scaffold; they come in live once the firmware begins its hardware
# integration phase. Keeping the manifest compilable on host CI without the
# esp toolchain is deliberate.
# esp-hal = { version = "0.23", features = ["esp32s3"] }
# esp-hal-embassy = { version = "0.7", features = ["esp32s3"] }
# embassy-executor = { version = "0.6", features = ["task-arena-size-32768"] }
# embassy-time = "0.3"
# esp-alloc = "0.7"
# esp-backtrace = { version = "0.14", features = ["esp32s3", "panic-handler", "println"] }
# defmt = "0.3"
# defmt-rtt = "0.4"
# mipidsi = "0.8"
# embedded-graphics = { workspace = true }
# embedded-hal-async = { workspace = true }

[[bin]]
name = "stackchan-firmware"
path = "src/main.rs"
