[package]
name = "stackchan-firmware"
version = "0.13.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "no_std + alloc firmware binary for the M5Stack CoreS3 StackChan; wires the stackchan-core domain onto esp-hal + mipidsi."
publish = false

[lints]
workspace = true

[dependencies]
stackchan-core = { path = "../stackchan-core" }
aw88298 = { path = "../aw88298" }
axp2101 = { path = "../axp2101" }
aw9523 = { path = "../aw9523" }
bm8563 = { path = "../bm8563" }
bmi270 = { path = "../bmi270" }
bmm150 = { path = "../bmm150" }
es7210 = { path = "../es7210" }
ft6336u = { path = "../ft6336u" }
gc0308 = { path = "../gc0308" }
ir-nec = { path = "../ir-nec" }
ltr553 = { path = "../ltr553" }
py32 = { path = "../py32" }
scservo = { path = "../scservo" }
si12t = { path = "../si12t" }
tracker = { path = "../tracker" }
# `heapless::Vec` for the per-frame multi-target candidate list
# translated from `tracker::Outcome.candidates` into the engine's
# `TrackingObservation`. Matches the cap (`MAX_CANDIDATES`).
heapless = "0.8"
embedded-graphics = { workspace = true }
embedded-hal-async = { workspace = true }
embedded-io-async = { workspace = true }
# `ExclusiveDevice` wraps the blocking esp-hal `Spi` + a CS pin into the
# `SpiDevice` shape `display-interface-spi` wants. No `critical-section`
# feature needed while the LCD is the sole SPI user.
embedded-hal-bus = "0.3"
# `mipidsi` drives the ILI9342C on CoreS3 over SPI. Its built-in
# `interface::SpiInterface` packages an SpiDevice + DC-pin into the
# `Interface` trait the driver consumes â€” no separate
# `display-interface-spi` needed at the 0.10 release.
mipidsi = "0.10"

# Crate versions chosen to match the upstream `esp-generate` esp-hal 1.0
# template. Mixing versions outside this set hits feature-unification
# errors (the crates ship coordinated internal features that move in
# lockstep). `esp-rtos` is the current embassy integration; it replaced
# `esp-hal-embassy` for the 1.0 line.
esp-hal = { version = "~1.0", features = ["defmt", "esp32s3", "psram", "unstable"] }
esp-rtos = { version = "0.2.0", features = ["defmt", "embassy", "esp-alloc", "esp32s3"] }
esp-bootloader-esp-idf = { version = "0.4.0", features = ["defmt", "esp32s3"] }
esp-alloc = { version = "0.9.0", features = ["defmt"] }

embassy-executor = { version = "0.9.1", features = ["defmt"] }
embassy-time = { version = "0.5.0", features = ["defmt"] }
# `embassy_futures::join::join` runs the audio task's RX RMS loop and
# TX feed loop concurrently inside one embassy task, instead of paying
# for a second task slot. Already in the lock via embassy-executor's
# transitive deps; declared here because we use it directly.
embassy-futures = "0.1"
# `Signal<CriticalSectionRawMutex, Pose>` hands the latest pose from the
# render task (which runs modifiers, incl. `IdleSway`) to the 50 Hz head
# task. 0.7 matches the embassy-executor 0.9 / embassy-time 0.5 triple
# per the embassy-sync release matrix.
embassy-sync = { version = "0.7", features = ["defmt"] }
# `embassy_embedded_hal::shared_bus::asynch::i2c::I2cDevice` wraps an
# `embassy-sync` `Mutex<NoopRawMutex, I2c>` so multiple tasks (touch,
# future RTC / IMU) can all hold `embedded-hal-async` IÂ˛C handles onto
# the single internal IÂ˛C0 bus without stepping on each other. Pinned
# to 0.5 to share the version esp-hal 1.0 already pulls transitively
# (on embassy-sync 0.7); 0.6 would drag in a second embassy-sync 0.8,
# and our `NoopRawMutex` would then resolve to the 0.7 type the 0.6
# crate can't consume.
embassy-embedded-hal = { version = "0.5", features = ["defmt"] }

defmt = "1.0.1"
# Log transport: defmt-encoded bytes over the ESP32-S3 USB-Serial-JTAG
# peripheral. `espflash flash --monitor --log-format defmt` decodes on
# the host side. No RTT probe, no host-level udev rules â€” just the
# same /dev/ttyACM1 serial path already used with dialout-group access.
esp-println = { version = "0.17.0", default-features = false, features = [
    "esp32s3",
    "defmt-espflash",
    "jtag-serial",
    "critical-section",
] }

static_cell = "2.1.1"
# `f32::sqrt` for the audio-task RMS computation. `stackchan-core`
# already depends on the same major version for `MouthFromAudio`'s
# dB mapping; sharing the dep keeps the workspace libm-free.
micromath = "2"

[features]
# Default: zero-overhead production build. The `tracking_trace`
# module's no-op `TraceState` ZST + empty methods compile to nothing.
default = []
# Enable structured `defmt` traces of the camera-tracking pipeline:
# attention + engagement state transitions, lock-fire latency,
# observation cadence. Use `just fmr-trace` (or `cargo +esp build
# --release --features tracking-trace`) to flash a build that emits
# these. Off in production to keep the JTAG channel quiet and avoid
# perturbing scheduler timing.
tracking-trace = []

[lib]
name = "stackchan_firmware"
path = "src/lib.rs"

[[bin]]
name = "stackchan-firmware"
path = "src/main.rs"

[[example]]
name = "bench"
path = "examples/bench.rs"

[[example]]
name = "touch_bench"
path = "examples/touch_bench.rs"

[[example]]
