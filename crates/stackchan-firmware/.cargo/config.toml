# Cargo config scoped to the firmware crate.
#
# `target` sets xtensa-esp32s3-none-elf so `cargo build`/`cargo run` inside
# crates/stackchan-firmware cross-compile without requiring --target on
# the command line. Other workspace crates are unaffected because this
# file lives under the firmware crate, not at the workspace root.
#
# `runner` routes `cargo run` through probe-rs, which flashes over the
# CoreS3's built-in USB-JTAG probe then opens an RTT session. Linker
# scripts (linkall.x, etc.) are injected by esp-hal's build script, so
# the only rustflag we need is -nostartfiles.

[target.xtensa-esp32s3-none-elf]
runner = "probe-rs run --chip=esp32s3 --preverify --always-print-stacktrace --no-location --catch-hardfault"

[env]
DEFMT_LOG = "info"

[build]
target = "xtensa-esp32s3-none-elf"
rustflags = [
    "-C", "link-arg=-nostartfiles",
    # esp-hal's linker script. Without it, `.rodata_desc.appdesc` lands
    # wherever the linker feels like, and the 2nd-stage bootloader reads
    # random code bytes as the ESP-IDF app descriptor — causing the
    # "efuse blk rev >= v98.56" false-positive reject.
    "-C", "link-arg=-Tlinkall.x",
    # defmt's decoder needs the format-string interning table in a
    # `.defmt` ELF section; `defmt.x` wires it in via a linker script
    # shipped by the `defmt` crate's build script.
    "-C", "link-arg=-Tdefmt.x",
]

[unstable]
build-std = ["alloc", "core"]
